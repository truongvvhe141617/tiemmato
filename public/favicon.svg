<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E3C"/>
      <stop offset="100%" style="stop-color:#D4862A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="6" y="12" width="20" height="13" rx="2.5" fill="white" opacity="0.95"/>
  <!-- Camera lens outer -->
  <circle cx="16" cy="18" r="4.5" fill="#8B5E3C"/>
  <!-- Camera lens inner -->
  <circle cx="16" cy="18" r="2.8" fill="#5D3A1A"/>
  <!-- Camera lens shine -->
  <circle cx="14.8" cy="16.8" r="0.9" fill="white" opacity="0.6"/>
  <!-- Viewfinder bump -->
  <rect x="12" y="9" width="8" height="4" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Flash dot -->
  <circle cx="9" cy="14.5" r="1.2" fill="#D4862A"/>
</svg>
